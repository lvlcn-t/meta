name: Lint Go

description: Lint Go code

inputs:
  go_version_file:
    description: Go version to use from go.mod
    required: false
    default: go.mod
  golangci_config:
    description: Path to the golangci config file
    required: false
    default: .golangci.yml
  env:
    description: Additional environment variables as KEY=VALUE pairs separated by newlines
    required: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4
    - name: Set up Go w/ go.mod version
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ inputs.go_version_file }}

    - name: Export additional environment variables
      if: inputs.env != ''
      shell: bash
      run: |
        while IFS= read -r line; do
          [[ -z "$line" ]] && continue
          echo "$line" >> "$GITHUB_ENV"
        done <<< "${{ inputs.env }}"

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        args: --config ${{ inputs.golangci_config }}
