# We have a dedicated CI workflow for building and releasing Go projects because
# we're using goreleaser to build and release Go projects.
name: Continuous Integration of a Go project

on:
  workflow_call:
    inputs:
      go_version_file:
        description: Location of the go.mod file to read the Go version from
        type: string
        required: false
        default: go.mod
      go_releaser_config:
        description: Location of the goreleaser configuration file
        type: string
        required: false
        default: .goreleaser.yml
    secrets:
      GPG_PRIVATE_KEY:
        description: GPG private key to sign the release
        required: false
      GPG_PASSPHRASE:
        description: GPG passphrase to sign the release
        required: false

permissions:
  # Needed for the scan-image action to read the image
  actions: read
  # Needed for goreleaser to read the contents of the repository
  contents: read
  # Needed for goreleaser to push the image
  packages: write
  # Needed to upload the trivy image scan results
  security-events: write

jobs:
  image:
    name: Build, scan & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Go
        uses: lvlcn-t/meta/.github/actions/build-go@main
        with:
          go_version_file: ${{ inputs.go_version_file }}
          releaser_args: release --snapshot --clean --skip=announce,validate --config ${{ inputs.go_releaser_config }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Resolve image ref
        id: image_ref
        run: |
          set -euo pipefail

          base="ghcr.io/${{ github.repository }}:commit-$(git rev-parse --short HEAD)"

          if docker image inspect "$base" >/dev/null 2>&1; then
            image="$base"
          elif docker image inspect "${base}-amd64" >/dev/null 2>&1; then
            image="${base}-amd64"
          elif docker manifest inspect "$base" >/dev/null 2>&1; then
            image="$base"
          elif docker manifest inspect "${base}-amd64" >/dev/null 2>&1; then
            image="${base}-amd64"
          else
            echo "Unable to resolve image reference for CI scan" >&2
            echo "Checked: $base and ${base}-amd64" >&2
            exit 1
          fi

          echo "value=$image" >> "$GITHUB_OUTPUT"
          echo "Using image: $image"

      - name: Push image to registry
        run: |
          if docker image inspect "${{ steps.image_ref.outputs.value }}" >/dev/null 2>&1; then
            docker push "${{ steps.image_ref.outputs.value }}"
          else
            echo "Image is not loaded in local Docker daemon, skipping push"
          fi

      - name: Scan Image
        uses: lvlcn-t/meta/.github/actions/scan-image@main
        with:
          image: ${{ steps.image_ref.outputs.value }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
